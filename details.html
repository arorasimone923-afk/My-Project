{% extends "base.html" %}
{% block content %}
<div class="card shadow p-4 mx-auto" style="max-width: 500px;">
    <h3 class="text-center mb-3">Enter Your Details</h3>
    <form method="post">
        <input class="form-control mb-3" name="name" placeholder="Name" required>
        <input class="form-control mb-3" name="age" placeholder="Age" required>
        <select class="form-select mb-3" name="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        <button class="btn btn-success w-100">Next</button>
    </form>
</div>
{% endblock %}
